<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenPX</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text-primary: #f0f0f0;
      --text-muted: #666666;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* Wordmark */
    .wordmark {
      user-select: none;
    }

    .wordmark img {
      height: 96px;
      width: auto;
      /* Flip dark mark to white for dark background */
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }

    /* Tagline */
    .tagline {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-align: center;
      text-transform: uppercase;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text-primary); }
  </style>
</head>
<body>

  <div class="container">

    <div class="wordmark">
      <img src="logo.png" alt="OpenPX" />
    </div>

    <p class="tagline">Something big is coming</p>

  </div>

  <footer>
    <a href="mailto:hello@openpx.org">hello@openpx.org</a>
  </footer>


</body>
</html>
